<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify OTP | Fund Master</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-bg">

<div class="auth-page">
    <div class="auth-card">
        <h2>Verify OTP</h2>
        <p class="subtitle">Enter the 6-digit OTP sent to your email</p>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        {% if message %}
            <p class="success">{{ message }}</p>
        {% endif %}

        <form method="POST" action="/verify-otp">
            <input type="text" name="otp" placeholder="Enter OTP" maxlength="6" required>
            <button type="submit">Verify OTP</button>
        </form>

        <div class="auth-links">
            <a href="/forgot-password">Resend OTP</a>
            <a href="/login">Back to Login</a>
        </div>
    </div>
</div>

</body>
</html>
